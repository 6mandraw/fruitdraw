<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>命運水果盤 5x5</title>

<style>
body {
  background: url("background.jpeg") no-repeat center center fixed;
  background-size: cover;
  color: white;
  text-align: center;
  font-family: Arial;
}

.title {
  margin: 20px;
  font-size: 42px;
  font-weight: bold;
  color: #fff;
  text-shadow:
    0 0 5px #ffd700,
    0 0 10px #ffd700,
    0 0 20px #ffcc00,
    0 0 40px #ffcc00;
  animation: floatTitle 1.2s ease-in-out infinite;
}

@keyframes floatTitle {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

/* 🎰 5x5 */
#board {
  display: grid;
  grid-template-columns: repeat(5, 70px);
  gap: 8px;
  justify-content: center;
}

.cell {
  width: 70px;
  height: 70px;
  font-size: 32px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  cursor: pointer;
  color: transparent;
  user-select: none;
  transition: 0.2s;
}

.cell:hover {
  outline: 3px solid #ff4d6d;
  transform: scale(1.05);
}

.win {
  background: white !important;
  color: black;
  box-shadow: 0 0 15px gold, 0 0 30px gold;
}
</style>
</head>

<body>

<h1 class="title">🎰命運水果盤 5x5🎰</h1>
<div id="board"></div>

<audio id="winSound" src="winSound.mp3" preload="auto"></audio>

<script>
/* =========================
   🎯 獎池設定（已更新）
========================= */

const fruits = [
  "🍇","🍋","🥑",   // 各4個
  "🍒","🍉","🥥","🍍" // 各3個
];

let revealed = [];
let cells = [];
let winRecord = {};

/* =========================
   🎲 生成 25 格
========================= */

function generateGrid() {
  let grid = [];

  // 🍇🍋🥑 各4個
  ["🍇","🍋","🥑"].forEach(f => {
    for (let i = 0; i < 4; i++) grid.push(f);
  });

  // 🍒🍉🥥🍍 各3個
  ["🍒","🍉","🥥","🍍"].forEach(f => {
    for (let i = 0; i < 3; i++) grid.push(f);
  });

  // 🧧 1個
  grid.push("🧧");

  // shuffle
  for (let i = grid.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [grid[i], grid[j]] = [grid[j], grid[i]];
  }

  return grid;
}

const board = document.getElementById("board");
const data = generateGrid();

/* =========================
   🏆 中獎判定（不變）
========================= */

function checkWin(symbol) {
  const count = revealed.filter(x => x === symbol).length;

  if (symbol === "🧧") {
    triggerWin(symbol);
    return;
  }

  if (!winRecord[symbol]) winRecord[symbol] = 0;

  const shouldWin = Math.floor(count / 3);

  while (winRecord[symbol] < shouldWin) {
    winRecord[symbol]++;
    triggerWin(symbol);
  }
}

/* =========================
   🎉 中獎效果
========================= */

function triggerWin(symbol) {
  playSound();

  cells.forEach(cell => {
    if (cell.value === symbol && cell.opened) {
      cell.el.classList.add("win");
    }
  });
}

/* =========================
   🔊 音效
========================= */

function playSound() {
  const audio = document.getElementById("winSound");
  audio.volume = 0.5;
  audio.currentTime = 0;
  audio.play().catch(()=>{});
}

/* =========================
   🧩 建立格子
========================= */

data.forEach(item => {
  const cell = document.createElement("div");
  cell.className = "cell";

  const cellObj = {
    el: cell,
    value: item,
    opened: false
  };

  cells.push(cellObj);

  cell.addEventListener("click", () => {
    if (cellObj.opened) return;

    cellObj.opened = true;
    cell.style.color = "white";
    cell.innerText = item;

    revealed.push(item);
    checkWin(item);
  });

  board.appendChild(cell);
});
</script>

</body>
</html>
